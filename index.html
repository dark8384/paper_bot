<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ My Live Arbitrage Bot Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #333;
            text-align: center;
        }
        .stat-card h3 {
            margin: 0 0 10px 0;
            color: #888;
            font-size: 14px;
        }
        .stat-card p {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
            color: #00ff88;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #333;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background-color: #2a2a2a;
            color: #00ff88;
            font-weight: 600;
        }
        tr:hover {
            background-color: #252525;
        }
        .badge {
            background: #00ff88;
            color: #121212;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>⚡ Live Arbitrage Monitor</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>Bot Status</h3>
            <p style="color: #00ff88;">🟢 ACTIVE & SCANNING</p>
        </div>
        <div class="stat-card">
            <h3>Active Safe Positions</h3>
            <p id="total-positions">0</p>
        </div>
        <div class="stat-card">
            <h3>Leverage Lock</h3>
            <p style="color: #ffaa00;">5.0x Strict</p>
        </div>
    </div>

    <h2>📊 Active Hedged Positions</h2>
    <table>
        <thead>
            <tr>
                <th>COIN</th>
                <th>PLAN</th>
                <th>BINANCE (ENTRY / SL / TP)</th>
                <th>BYBIT (ENTRY / SL / TP)</th>
                <th>INITIAL GAP</th>
            </tr>
        </thead>
        <tbody id="trades-table-body">
            </tbody>
    </table>
</div>

<script>
    // Automatically fetch data from your repo's paper_trades.json
    async function loadLiveLedger() {
        try {
            // Fetching relative to the root directory where index.html and json live
            const response = await fetch('paper_trades.json?t=' + new Date().getTime());
            if (!response.ok) throw new Error('No active trades file found.');
            
            const trades = await response.json();
            const tableBody = document.getElementById('trades-table-body');
            document.getElementById('total-positions').innerText = trades.length;

            if (trades.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="no-data">😴 Koi active trade nahi hai abhi. Bot safe entry dhoond raha hai...</td></tr>`;
                return;
            }

            tableBody.innerHTML = ''; // Clear loading state
            trades.forEach(trade => {
                const row = `
                    <tr>
                        <td><span class="badge">${trade.coin}</span></td>
                        <td style="color: #55aaff; font-weight: bold;">${trade.execution_plan}</td>
                        <td>
                            <b>Entry:</b> ${trade.binance_entry}<br>
                            <span style="color: #ff5555;">SL: ${trade.binance_sl}</span><br>
                            <span style="color: #00ff88;">TP: ${trade.binance_tp}</span>
                        </td>
                        <td>
                            <b>Entry:</b> ${trade.bybit_entry}<br>
                            <span style="color: #ff5555;">SL: ${trade.bybit_sl}</span><br>
                            <span style="color: #00ff88;">TP: ${trade.bybit_tp}</span>
                        </td>
                        <td style="color: #00ff88; font-weight: bold;">${trade.initial_funding_gap}</td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });

        } catch (error) {
            console.error('Error rendering dashboard:', error);
            document.getElementById('trades-table-body').innerHTML = 
                `<tr><td colspan="5" class="no-data">❌ Ledger sync failed or empty file.</td></tr>`;
        }
    }

    // Load instantly, then refresh data every 30 seconds
    loadLiveLedger();
    setInterval(loadLiveLedger, 30000);
</script>

</body>
</html>
